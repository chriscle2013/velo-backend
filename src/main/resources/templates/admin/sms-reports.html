<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/layout :: head"></head>
<body>
    <div th:replace="admin/layout :: body"></div>
    
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-white">
                <h6 class="mb-0"><i class="fas fa-sms"></i> Reportes de SMS Spam</h6>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Remitente</th>
                            <th>Mensaje</th>
                            <th>Categoría</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="report : ${smsReports}">
                            <td th:text="${report.id}"></td>
                            <td th:text="${report.phoneNumber}"></td>
                            <td th:text="${report.messageBody}"></td>
                            <td th:text="${report.category}"></td>
                            <td th:text="${#temporals.format(report.reportDate, 'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
