<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velo Admin - Control Total</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --velo-dark: #020617;
            --velo-card: #0F172A;
            --velo-accent: #2563EB;
            --velo-neon: #60A5FA;
        }
        body {
            background-color: var(--velo-dark);
            color: #F8FAFC;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        .sidebar {
            min-height: 100vh;
            background-color: var(--velo-card);
            border-right: 1px solid #1E293B;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }
        .sidebar a {
            color: #94A3B8;
            text-decoration: none;
            padding: 14px 24px;
            display: block;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            font-weight: 500;
        }
        .sidebar a:hover {
            background: rgba(37, 99, 235, 0.1);
            color: var(--velo-neon);
            padding-left: 32px;
        }
        .sidebar a.active {
            background: rgba(37, 99, 235, 0.15);
            color: white;
            border-left: 4px solid var(--velo-accent);
        }
        .sidebar i {
            width: 25px;
            margin-right: 12px;
            font-size: 1.1rem;
        }
        .content {
            padding: 30px;
            background-color: var(--velo-dark);
            min-height: 100vh;
        }
        .navbar-top {
            background: var(--velo-card);
            border: 1px solid #1E293B;
            padding: 18px 25px;
            margin-bottom: 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Estilo para las tablas que cargan dentro */
        .table { color: #E2E8F0; }
        .card { border-radius: 20px !important; }
    </style>
</head>
<body>
    <div class="container-fluid" th:fragment="body">
        <div class="row">
            <!-- Sidebar Velo Premium -->
            <div class="col-md-2 p-0 sidebar">
                <div class="text-center py-5">
                    <div class="mb-2">
                        <i class="fas fa-shield-halved fa-3x text-primary"></i>
                    </div>
                    <h4 class="text-white fw-bold tracking-tight">VELO</h4>
                    <p class="text-muted small text-uppercase letter-spacing-1">Admin Console</p>
                </div>
                <nav>
                    <a href="/admin/dashboard" th:classappend="${page == 'admin/dashboard' ? 'active' : ''}">
                        <i class="fas fa-chart-pie"></i> Dashboard
                    </a>
                    <a href="/admin/numbers" th:classappend="${page == 'admin/numbers' ? 'active' : ''}">
                        <i class="fas fa-users-gear"></i> Miembros Velo
                    </a>
                    <!-- NUEVA OPCIÓN DE SMS -->
                    <a href="/admin/sms-reports" th:classappend="${page == 'admin/sms-reports' ? 'active' : ''}">
                        <i class="fas fa-comment-slash text-warning"></i> SMS Spam
                    </a>
                    <a href="/admin/reports" th:classappend="${page == 'admin/reports' ? 'active' : ''}">
                        <i class="fas fa-shield-virus"></i> Reportes Spam
                    </a>
                    <hr class="mx-4 border-secondary opacity-25">
                    <a href="/admin/logout" class="text-danger">
                        <i class="fas fa-power-off"></i> Cerrar Sesión
                    </a>
                </nav>
            </div>
            
            <!-- Content Area -->
            <div class="col-md-10 p-0">
                <div class="content">
                    <div class="navbar-top">
                        <h5 class="mb-0 text-white fw-semibold">
                            <i class="fas fa-user-check text-primary me-2"></i> 
                            Panel de Control Maestro
                        </h5>
                        <span class="badge bg-dark border border-secondary text-muted">v2.1 Stable</span>
                    </div>
                    
                    <!-- Aquí se inyecta el contenido de cada página -->
                    <div th:replace="${page} :: content"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
